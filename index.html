<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">Anime <span>Kingdom</span></div>
        <div class="search-bar"><input type="text" placeholder="Search Anime..."></div>
    </header>

    <main class="container">
        <h2 class="section-title">Latest Updates</h2>
        <div class="anime-grid" id="animeGrid"></div>
    </main>

    <!-- Modal for Seasons & Episodes -->
    <div id="animeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <div class="selector-wrapper">
                        <select id="seasonSelect" onchange="loadEpisodes()"></select>
                    </div>
                </div>
                <div class="episode-list" id="episodeList"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
