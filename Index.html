<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeStream - Netflix Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">ANIME<span>STREAM</span></div>
    </nav>

    <div class="container">
        <h1>Trending Now</h1>
        <div class="anime-grid" id="animeGrid">
            <!-- ඇනිමේ කාඩ්පත් මෙහි දිස්වනු ඇත -->
        </div>
    </div>

    <!-- Modal for Seasons & Episodes -->
    <div id="animeModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Anime Name</h2>
            <div class="season-selector">
                <label>Select Season:</label>
                <select id="seasonSelect" onchange="loadEpisodes()"></select>
            </div>
            <div class="episode-list" id="episodeList">
                <!-- Episodes මෙහි දිස්වනු ඇත -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
